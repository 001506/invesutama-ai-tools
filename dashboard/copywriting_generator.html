<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tool AI - Copywriting</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

  <p class="badge">🔥 Free Beta Access</p>

  <div class="container">

    <h2>✍️ AI Copywriting Generator</h2>

    <!-- INFO LIMIT -->
    <p id="limitInfo"></p>

    <div class="card">

      <!-- INPUT -->
      <label>Produk / Jasa:</label>
      <input type="text" id="product" placeholder="Contoh: Jasa Umroh">

      <label>Target Market:</label>
      <input type="text" id="target" placeholder="Contoh: Orang tua 40+">

      <label>Tujuan:</label>
      <select id="goal">
        <option>Penjualan</option>
        <option>Branding</option>
        <option>Edukasi</option>
      </select>

      <label>Gaya Bahasa:</label>
      <select id="tone">
        <option>Santai</option>
        <option>Profesional</option>
        <option>Hard Selling</option>
        <option>Storytelling</option>
      </select>

      <label>Pilih Mode:</label>
      <select id="mode">
        <option value="instagram">Instagram Caption</option>
        <option value="ads">Ads Copy</option>
        <option value="video">Script Video</option>
      </select>

      <br><br>

      <!-- BUTTON -->
      <button class="btn-primary" onclick="generateCopy(data)">⚡ Generate Copywriting</button>
      <h3>Hasil Copywriting:</h3>
      <div id="results"></div>
    </div>
  </div>

  <button onclick="copyText()">📋 Copy</button>

  <!-- JS -->
  <script type="module" src="js/app.js"></script>

  <footer>
    <p>© 2026 Invesutama AI Tools</p>
  </footer>

</body>
</html>
